<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🍽️ Recipe RAG Search</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #333;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 3em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .header p {
            font-size: 1.2em;
            opacity: 0.9;
        }

        .search-section {
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            margin-bottom: 30px;
        }

        .ingredient-input {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        #ingredient-input {
            flex: 1;
            min-width: 200px;
            padding: 12px;
            border: 2px solid #e1e5e9;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        #ingredient-input:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 600;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover {
            background: #5a6fd8;
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: #f8f9fa;
            color: #6c757d;
            border: 2px solid #e9ecef;
        }

        .btn-secondary:hover {
            background: #e9ecef;
        }

        .ingredients-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 20px;
        }

        .ingredient-tag {
            background: #e3f2fd;
            color: #1976d2;
            padding: 6px 12px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
        }

        .ingredient-tag .remove {
            cursor: pointer;
            color: #d32f2f;
            font-weight: bold;
        }

        .results-section {
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .recipe-card {
            border: 1px solid #e1e5e9;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
            transition: all 0.3s;
        }

        .recipe-card:hover {
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            transform: translateY(-2px);
        }

        .recipe-title {
            font-size: 1.5em;
            color: #333;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .similarity-score {
            background: #4caf50;
            color: white;
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 0.8em;
            font-weight: bold;
        }

        .ingredients-preview {
            color: #666;
            margin-bottom: 15px;
            font-size: 0.9em;
        }

        .recipe-links {
            display: flex;
            gap: 15px;
            margin-top: 15px;
        }

        .recipe-link {
            color: #667eea;
            text-decoration: none;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .recipe-link:hover {
            text-decoration: underline;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }

        .error {
            background: #ffebee;
            color: #c62828;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            border-left: 4px solid #c62828;
        }

        .status {
            text-align: center;
            margin-bottom: 20px;
            padding: 10px;
            border-radius: 8px;
        }

        .status.ready {
            background: #e8f5e8;
            color: #2e7d32;
        }

        .status.error {
            background: #ffebee;
            color: #c62828;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .tab-btn {
            padding: 12px 28px;
            border: none;
            border-radius: 8px 8px 0 0;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            background: rgba(255,255,255,0.3);
            color: white;
            transition: background 0.2s;
        }

        .tab-btn.active {
            background: white;
            color: #667eea;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .sub-item {
            margin-bottom: 12px;
        }

        .sub-ingredient {
            font-weight: 600;
            color: #333;
            margin-bottom: 4px;
        }

        .sub-tags {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .sub-tag {
            background: #fff3e0;
            color: #e65100;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 14px;
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 2em;
            }

            .container {
                padding: 10px;
            }

            .search-section, .results-section {
                padding: 20px;
            }

            .ingredient-input {
                flex-direction: column;
            }

            .btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🍽️ Recipe RAG Search</h1>
            <p>Find recipes based on ingredients you have! Powered by AI embeddings.</p>
        </div>

        <div id="status" class="status" style="display: none;"></div>

        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('search')">🔍 Recipe Search</button>
            <button class="tab-btn" onclick="switchTab('substitutions')">🔄 Substitutions</button>
        </div>

        <div id="tab-search" class="tab-content active">
        <div class="search-section">
            <h2 style="margin-bottom: 20px; color: #333;">What ingredients do you have?</h2>

            <div class="ingredient-input">
                <input type="text" id="ingredient-input" placeholder="Enter an ingredient (e.g., chicken, garlic, rice)" autocomplete="off">
                <button class="btn btn-primary" onclick="addIngredient()">Add</button>
                <button class="btn btn-secondary" onclick="clearIngredients()">Clear All</button>
            </div>

            <div id="ingredients-list" class="ingredients-list"></div>

            <button class="btn btn-primary" style="width: 100%; font-size: 18px; padding: 15px;" onclick="searchRecipes()">
                🔍 Find Recipes
            </button>
        </div>

        <div class="results-section">
            <h2 style="margin-bottom: 20px; color: #333;">Recipe Results</h2>
            <div id="results"></div>
        </div>
        </div>

        <div id="tab-substitutions" class="tab-content">
        <div class="search-section">
            <h2 style="margin-bottom: 20px; color: #333;">What ingredients do you have?</h2>
            <div class="ingredient-input">
                <input type="text" id="sub-ingredient-input" placeholder="Enter an ingredient (e.g., greek yogurt, oat milk)" autocomplete="off">
                <button class="btn btn-primary" onclick="addSubIngredient()">Add</button>
                <button class="btn btn-secondary" onclick="clearSubstitutions()">Clear All</button>
            </div>
            <div id="sub-ingredients-list" class="ingredients-list"></div>
            <button class="btn btn-primary" style="width: 100%; font-size: 18px; padding: 15px;" onclick="findSubstitutions()">
                🔄 Find Substitutions & Recipes
            </button>
        </div>

        <div class="results-section" id="sub-results-section" style="display:none;">
            <h2 style="margin-bottom: 20px; color: #333;">Substitutions</h2>
            <div id="sub-substitutions"></div>
            <h2 style="margin: 20px 0; color: #333;">Recipes Using Substitutions</h2>
            <div id="sub-results"></div>
        </div>
        </div>

    </div>

    <script>
        let ingredients = [];
        let subIngredients = [];

        function switchTab(tab) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.getElementById('tab-' + tab).classList.add('active');
            event.target.classList.add('active');
        }

        function addSubIngredient() {
            const input = document.getElementById('sub-ingredient-input');
            const ingredient = input.value.trim().toLowerCase();
            if (ingredient && !subIngredients.includes(ingredient)) {
                subIngredients.push(ingredient);
                updateSubIngredientsDisplay();
                input.value = '';
            }
        }

        function removeSubIngredient(ingredient) {
            subIngredients = subIngredients.filter(i => i !== ingredient);
            updateSubIngredientsDisplay();
        }

        function clearSubstitutions() {
            subIngredients = [];
            updateSubIngredientsDisplay();
            document.getElementById('sub-results-section').style.display = 'none';
        }

        function updateSubIngredientsDisplay() {
            const listDiv = document.getElementById('sub-ingredients-list');
            listDiv.innerHTML = '';
            subIngredients.forEach(ingredient => {
                const tag = document.createElement('div');
                tag.className = 'ingredient-tag';
                tag.innerHTML = `${ingredient} <span class="remove" onclick="removeSubIngredient('${ingredient}')">×</span>`;
                listDiv.appendChild(tag);
            });
        }

        function findSubstitutions() {
            if (subIngredients.length === 0) {
                alert('Please add some ingredients first!');
                return;
            }

            const section = document.getElementById('sub-results-section');
            section.style.display = 'block';
            document.getElementById('sub-substitutions').innerHTML = '<div class="loading">🔄 Finding substitutions...</div>';
            document.getElementById('sub-results').innerHTML = '';

            fetch('/api/substitutions', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ ingredients: subIngredients })
            })
            .then(r => r.json())
            .then(data => {
                if (data.error) {
                    document.getElementById('sub-substitutions').innerHTML = `<div class="error">❌ ${data.error}</div>`;
                    return;
                }

                let subHtml = '';
                for (const [ingredient, subs] of Object.entries(data.substitutions)) {
                    subHtml += `
                        <div class="sub-item">
                            <div class="sub-ingredient">🥄 ${ingredient}</div>
                            <div class="sub-tags">
                                ${subs.map(s => `<span class="sub-tag">${s}</span>`).join('')}
                            </div>
                        </div>`;
                }
                document.getElementById('sub-substitutions').innerHTML = subHtml || '<p>No substitutions found.</p>';

                let recipeHtml = '';
                if (data.recipes && data.recipes.length > 0) {
                    data.recipes.forEach((recipe, index) => {
                        const ingredientsPreview = recipe.ingredients.slice(0, 6).join(', ') +
                            (recipe.ingredients.length > 6 ? `, ... (+${recipe.ingredients.length - 6} more)` : '');
                        recipeHtml += `
                            <div class="recipe-card">
                                <div class="recipe-title">
                                    ${index + 1}. ${recipe.title}
                                    <span class="similarity-score">${(recipe.similarity_score * 100).toFixed(1)}%</span>
                                </div>
                                <div class="ingredients-preview">🥘 <strong>Ingredients (${recipe.ingredients.length}):</strong> ${ingredientsPreview}</div>
                                <div class="recipe-links">
                                    ${recipe.link ? `<a href="${recipe.link.startsWith('http') ? recipe.link.replace('https://', 'http://') : 'http://' + recipe.link}" target="_blank" class="recipe-link">🔗 View Recipe</a>` : ''}
                                    ${recipe.source ? `<span style="color:#666;">📝 ${recipe.source}</span>` : ''}
                                </div>
                            </div>`;
                    });
                } else {
                    recipeHtml = '<p style="color:#666;">No recipes found.</p>';
                }
                document.getElementById('sub-results').innerHTML = recipeHtml;
            })
            .catch(err => {
                document.getElementById('sub-substitutions').innerHTML = '<div class="error">❌ Request failed. Please try again.</div>';
            });
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            document.getElementById('ingredient-input').addEventListener('keypress', function(e) {
                if (e.key === 'Enter') addIngredient();
            });
            document.getElementById('sub-ingredient-input').addEventListener('keypress', function(e) {
                if (e.key === 'Enter') addSubIngredient();
            });
            checkStatus();
        });

        function checkStatus() {
            fetch('/api/status')
                .then(response => response.json())
                .then(data => {
                    const statusDiv = document.getElementById('status');
                    if (data.status === 'ready') {
                        statusDiv.className = 'status ready';
                        statusDiv.textContent = `✅ System ready with ${data.recipe_count.toLocaleString()} recipes`;
                        statusDiv.style.display = 'block';
                    } else {
                        statusDiv.className = 'status error';
                        statusDiv.textContent = `❌ ${data.message}`;
                        statusDiv.style.display = 'block';
                    }
                })
                .catch(error => {
                    console.error('Status check failed:', error);
                });
        }

        function addIngredient() {
            const input = document.getElementById('ingredient-input');
            const ingredient = input.value.trim().toLowerCase();

            if (ingredient && !ingredients.includes(ingredient)) {
                ingredients.push(ingredient);
                updateIngredientsDisplay();
                input.value = '';
            }
        }

        function removeIngredient(ingredient) {
            ingredients = ingredients.filter(ing => ing !== ingredient);
            updateIngredientsDisplay();
        }

        function clearIngredients() {
            ingredients = [];
            updateIngredientsDisplay();
            document.getElementById('results').innerHTML = '';
        }

        function updateIngredientsDisplay() {
            const listDiv = document.getElementById('ingredients-list');
            listDiv.innerHTML = '';

            ingredients.forEach(ingredient => {
                const tag = document.createElement('div');
                tag.className = 'ingredient-tag';
                tag.innerHTML = `
                    ${ingredient}
                    <span class="remove" onclick="removeIngredient('${ingredient}')">×</span>
                `;
                listDiv.appendChild(tag);
            });
        }

        function searchRecipes() {
            if (ingredients.length === 0) {
                alert('Please add some ingredients first!');
                return;
            }

            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = '<div class="loading">🔍 Searching for recipes...</div>';

            fetch('/api/search', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                    ingredients: ingredients,
                    top_k: 8
                })
            })
            .then(response => response.json())
            .then(data => {
                if (data.error) {
                    resultsDiv.innerHTML = `<div class="error">❌ Error: ${data.error}</div>`;
                    return;
                }

                if (data.results.length === 0) {
                    resultsDiv.innerHTML = '<div class="error">❌ No recipes found. Try different ingredients.</div>';
                    return;
                }

                let html = `<p style="margin-bottom: 20px; color: #666;">Found ${data.total_results} recipes for: "${data.query}"</p>`;

                data.results.forEach((recipe, index) => {
                    const ingredientsPreview = recipe.ingredients.slice(0, 6).join(', ') +
                        (recipe.ingredients.length > 6 ? `, ... (+${recipe.ingredients.length - 6} more)` : '');

                    html += `
                        <div class="recipe-card">
                            <div class="recipe-title">
                                ${index + 1}. ${recipe.title}
                                <span class="similarity-score">${(recipe.similarity_score * 100).toFixed(1)}%</span>
                            </div>
                            <div class="ingredients-preview">
                                🥘 <strong>Ingredients (${recipe.ingredients.length}):</strong> ${ingredientsPreview}
                            </div>
                            <div class="recipe-links">
                                ${recipe.link ? `<a href="${recipe.link.startsWith('http') ? recipe.link.replace('https://', 'http://') : 'http://' + recipe.link}" target="_blank" class="recipe-link">🔗 View Recipe</a>` : ''}
                                ${recipe.source ? `<span style="color: #666;">📝 Source: ${recipe.source}</span>` : ''}
                            </div>
                        </div>
                    `;
                });

                resultsDiv.innerHTML = html;
            })
            .catch(error => {
                console.error('Search failed:', error);
                resultsDiv.innerHTML = '<div class="error">❌ Search failed. Please try again.</div>';
            });
        }
    </script>
</body>
</html>
